<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta Band Validation Grid</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            width: 600px; 
            height: 600px; 
            background-color: #000000; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            overflow: hidden; 
        }

        .grid-container { display: flex; gap: 20px; }

        /* Default State */
        .box {
            width: 120px;
            height: 120px;
            background-color: #222222;
            border: 3px solid #444444;
            border-radius: 16px;
            transition: all 0.1s ease;
            outline: none;
        }

        /* 1. Highlight State (Swiping / Focusing) -> Bright Green */
        .box:focus {
            background-color: #00ff00;
            border-color: #ffffff;
            transform: scale(1.1);
            box-shadow: 0 0 25px rgba(0, 255, 0, 0.8);
        }

        /* 2. Clicked / Click State -> Bright Red */
        .box:active, .box.clicked-flash {
            background-color: #ff0000 !important;
            border-color: #ffffff !important;
            box-shadow: 0 0 25px rgba(255, 0, 0, 0.9) !important;
            transform: scale(0.95) !important;
        }
    </style>
</head>
<body>

    <div class="grid-container">
        <button class="box" id="box1" autofocus></button>
        <button class="box" id="box2"></button>
        <button class="box" id="box3"></button>
    </div>

    <script>
        window.addEventListener('load', () => {
            document.getElementById('box1').focus();
        });

        // Add a visual flash listener for every box when clicked/selected
        document.querySelectorAll('.box').forEach(box => {
            const flashAction = () => {
                box.classList.add('clicked-flash');
                setTimeout(() => box.classList.remove('clicked-flash'), 150);
            };

            box.addEventListener('click', flashAction);
        });
    </script>
</body>
</html>
