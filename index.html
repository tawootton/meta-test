<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta Band 3x3 Grid</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            width: 600px; 
            height: 600px; 
            background-color: #000000; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            overflow: hidden; 
        }

        /* 3x3 grid block mapping out a clean square footprint */
        .grid-container { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 15px;
            width: 400px;
            height: 400px;
        }

        /* Default State */
        .box {
            width: 100%;
            height: 100%;
            background-color: #222222;
            border: 3px solid #444444;
            border-radius: 12px;
            transition: all 0.1s ease;
            outline: none;
        }

        /* 1. Highlight State (Swiping / Hovering) -> Bright Green */
        .box:focus {
            background-color: #00ff00;
            border-color: #ffffff;
            transform: scale(1.08);
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.7);
            position: relative;
            z-index: 10;
        }

        /* 2. Clicked / Confirmed State -> Bright Red */
        .box:active, .box.clicked-flash {
            background-color: #ff0000 !important;
            border-color: #ffffff !important;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.8) !important;
            transform: scale(0.95) !important;
        }
    </style>
</head>
<body>

    <div class="grid-container">
        <button class="box" id="box1" autofocus></button>
        <button class="box" id="box2"></button>
        <button class="box" id="box3"></button>
        <button class="box" id="box4"></button>
        <button class="box" id="box5"></button>
        <button class="box" id="box6"></button>
        <button class="box" id="box7"></button>
        <button class="box" id="box8"></button>
        <button class="box" id="box9"></button>
    </div>

    <script>
        // Force initial matrix focus right at boot
        window.addEventListener('load', () => {
            document.getElementById('box1').focus();
        });

        // Map instant flash feedback handles to all 9 matrix points
        document.querySelectorAll('.box').forEach(box => {
            const flashAction = () => {
                box.classList.add('clicked-flash');
                setTimeout(() => box.classList.remove('clicked-flash'), 150);
            };

            box.addEventListener('click', flashAction);
        });
    </script>
</body>
</html>
